<!DOCTYPE html>
<html>
<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>World Cup Dataa Lookup</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
   <link href="../hw3/css/styles.css" rel="stylesheet">
</head>

<body>

<h1>FIFA World Cup Data Lookup</h1>

<form id="wcForm">

    <label>
        Select World Cup:
        <select id="yearSelect">
            <option value="">-- Choose Year --</option>
        </select>
    </label>

    <br><br>

    <label>
        Filter Team (optional):
    <input 
        type="text" 
        id="teamSearch"
        placeholder="Example: Spain">
    </label>
    
    <br><br>

    <button type="submit">
        Find Matches
    </button>

</form>

<div id="error"></div>

<h2>Tournament Matches</h2>

<div id="matches"></div>

<script src="../hw3/js/script.js"></script>
</body>
</html>
